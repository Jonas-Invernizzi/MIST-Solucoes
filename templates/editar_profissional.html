{% extends "_base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="templates/css/registro.css" />
{% endblock %}

{% block conteudo %}
<div class="registro-wrapper">
  <form
    id="form-editar-prof"
    method="POST"
    action="tela_registro.php{% if id_alvo %}?id={{ id_alvo }}{% endif %}"
    enctype="multipart/form-data"
    class="layout-duplo"
  >
    <aside class="perfil-foto">
      <svg
        id="defaultUserIcon"
        viewBox="0 0 100 100"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        style="{% if user.foto_perfil %}display:none;{% endif %}"
      >
        <path fill-rule="evenodd" clip-rule="evenodd" d="M50 100C77.6142 100 100 77.6142 100 50C100 22.3858 77.6142 0 50 0C22.3858 0 0 22.3858 0 50C0 77.6142 22.3858 100 50 100ZM50 24C41.1634 24 34 31.1634 34 40C34 48.8366 41.1634 56 50 56C58.8366 56 66 48.8366 66 40C66 31.1634 58.8366 24 50 24ZM26.6343 82.684C30.6552 73.1818 40.0988 66 50 66C59.9012 66 69.3448 73.1818 73.3657 82.684C67.1478 89.1558 58.9803 93 50 93C41.0197 93 32.8522 89.1558 26.6343 82.684Z" fill="#1e1e1e"/>
      </svg>
      <img
        id="previewImagem"
        src="{% if user.foto_perfil %}img/{{ user.foto_perfil }}{% endif %}"
        alt="Foto de Perfil"
        style="{% if not user.foto_perfil %}display: none;{% endif %}"
        />
      <label for="foto_perfil" class="btn-escuro">Alterar foto profissional</label>
      <input type="file" id="foto_perfil" name="foto_perfil" accept="image/*" style="display: none" />

      {% if user.foto_perfil %}
      <div class="remover-foto-container" style="margin-top: 10px;">
        <label style="font-size: 0.8rem; color: #667;">
          <input type="checkbox" name="remover_foto" value="1" /> Remover foto atual
        </label>
      </div>
      {% endif %}

      <a href="logout.php" class="btn-logout" style="margin-top: 20px; display: inline-block;">Sair da Conta</a>
    </aside>

    <section class="card form-registro">
      <h2 style="font-size: 1.1rem; color: #000; font-weight: 500">Editar Perfil Profissional</h2>

      {% if erro %}
      <div style="padding: 12px; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; border-radius: 6px; margin-bottom: 20px;">
        {{ erro }}
      </div>
      {% endif %}

      <div class="linha-inputs">
        <div class="form-group">
          <input name="nome" type="text" placeholder="Nome Completo" value="{{ user.nome }}" required />
        </div>
        <div class="form-group">
          <input name="cpf" type="text" placeholder="CPF" value="{{ user.cpf }}" maxlength="14" required />
        </div>
      </div>

      <div class="linha-inputs">
        <div class="form-group">
          <input name="email" type="email" placeholder="E-mail" value="{{ user.email }}" required />
        </div>
        <div class="form-group">
          <input name="telefone" type="tel" placeholder="Telefone" value="{{ user.telefone }}" required />
        </div>
      </div>

      <div class="linha-inputs">
        <div class="form-group">
          <label style="font-size: 0.8rem; color: #667;">Data de Nascimento</label>
          <input name="nascimento" type="date" value="{{ user.data_nascimento }}" required />
        </div>
        <div class="form-group">
          <label style="font-size: 0.8rem; color: #667;">Senha</label>
          <input name="senha" type="password" placeholder="Nova Senha (deixe em branco)" />
        </div>
      </div>

      <div class="form-group">
        <input name="endereco" type="text" placeholder="Endereço Residencial" value="{{ user.endereco }}" required />
      </div>

      <div class="linha-inputs">
        <div class="form-group">
          <input name="endereco_trabalho" type="text" placeholder="Local de Atuação / Endereço Comercial" value="{{ user.endereco_trabalho }}" required />
        </div>
        <div class="form-group">
          <!-- right column intentionally left blank to preserve spacing -->
        </div>
      </div>

      <div class="linha-inputs">
        <div class="form-group-caixa">
          <label style="font-size: 0.8rem; color: #667;">Descrição</label>
          <textarea name="descricao" placeholder="Experiência profissional...">{{ user.descricao }}</textarea>
        </div>
        <div class="form-group">
          <label style="font-size: 0.8rem; color: #667;">Profissões / Tags</label>
          <div class="tag-editor" data-name="tags" data-placeholder="Digite profissões..."></div>
          <input type="hidden" name="tags" value="{{ user.trabalho }}" />
        </div>
      </div>

      <input type="hidden" name="tipo_base" value="profissional" />

      <div class="rodape-form">
        <button type="submit" class="btn btn-salvar">Salvar Alterações</button>
      </div>
    </section>
  </form>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const inputFoto = document.getElementById("foto_perfil");
    const preview = document.getElementById("previewImagem");
    const icon = document.getElementById("defaultUserIcon");

    if (inputFoto) {
      inputFoto.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (re) => {
            preview.src = re.target.result;
            preview.style.display = "block";
            icon.style.display = "none";
          };
          reader.readAsDataURL(file);
        }
      });
    }
  });
</script>
{% endblock %}
