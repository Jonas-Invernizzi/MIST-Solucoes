<script>
document.getElementById('input-foto').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      const imgPreview = document.getElementById('img-preview');
      const svgPlaceholder = document.getElementById('placeholder-svg');
      
      imgPreview.src = event.target.result;
      imgPreview.style.display = 'block'; // Mostra a imagem
      svgPlaceholder.style.display = 'none'; // Esconde o ícone preto
    }
    reader.readAsDataURL(file);
  }
});

const telInput = document.getElementById('telefone');

telInput.addEventListener('input', (e) => {
  let value = e.target.value;
  
  // Remove tudo que não for número
  value = value.replace(/\D/g, "");

  // Se não começar com 55, podemos forçar ou deixar o usuário digitar
  // Aqui vamos aplicar a máscara: +55 (00) 00000-0000
  value = value.replace(/^(\d{2})(\d{2})(\d{5})(\d{4}).*/, "+$1 ($2) $3-$4");
  
  // Formatação progressiva (para o usuário ver enquanto digita)
  if (value.length <= 11) {
      value = value.replace(/^(\d{2})(\d{2})(\d{5})(\d{0,4})/, "+$1 ($2) $3-$4");
  }

  e.target.value = value;
});

var element = document.getElementById('telefone');
var maskOptions = {
  mask: '+{55} (00) 00000-0000'
};
var mask = IMask(element, maskOptions);
</script>
