<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Perfil - MIST Soluções</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page-wrap">
    <header class="topo topo-header">
      <img class="logo" src="MIST.jpg" alt="MIST Soluções" />
      <div class="menu-usuario">
        <div class="links-acesso">
          <a href="Login.html">Entrar</a>
          
        </div>
        <svg class="icone-pequeno" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M50 100C77.6142 100 100 77.6142 100 50C100 22.3858 77.6142 0 50 0C22.3858 0 0 22.3858 0 50C0 77.6142 22.3858 100 50 100ZM50 24C41.1634 24 34 31.1634 34 40C34 48.8366 41.1634 56 50 56C58.8366 56 66 48.8366 66 40C66 31.1634 58.8366 24 50 24ZM26.6343 82.684C30.6552 73.1818 40.0988 66 50 66C59.9012 66 69.3448 73.1818 73.3657 82.684C67.1478 89.1558 58.9803 93 50 93C41.0197 93 32.8522 89.1558 26.6343 82.684Z" fill="#1e1e1e"/>
        </svg>
      </div>
    </header>

    <main class="centered layout-duplo">
      <aside class="perfil-foto">
        <svg width="280" height="280" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M50 100C77.6142 100 100 77.6142 100 50C100 22.3858 77.6142 0 50 0C22.3858 0 0 22.3858 0 50C0 77.6142 22.3858 100 50 100ZM50 24C41.1634 24 34 31.1634 34 40C34 48.8366 41.1634 56 50 56C58.8366 56 66 48.8366 66 40C66 31.1634 58.8366 24 50 24ZM26.6343 82.684C30.6552 73.1818 40.0988 66 50 66C59.9012 66 69.3448 73.1818 73.3657 82.684C67.1478 89.1558 58.9803 93 50 93C41.0197 93 32.8522 89.1558 26.6343 82.684Z" fill="#1e1e1e"/>
        </svg>
        <input type="file" class="btn-escuro">Adicionar foto de perfil</input>
      </aside>

      <section class="card form-registro">
        <h2 style="font-size: 1.1rem; color: #000; font-weight: 500;">Criar Perfil</h2>

        <form>
          <div class="linha-inputs">
            <div class="form-group">
              <input id="nome" type="text" placeholder="Nome" required />
            </div>
            <div class="form-group">
              <input id="nascimento" type="text" placeholder="Nascimento" required />
            </div>
          </div>

          <div class="linha-inputs">
            <div class="form-group">
              <input id="telefone" type="tel" placeholder="Telefone" required />
            </div>
            <div class="form-group">
              <input id="email" type="email" placeholder="E-mail" required />
            </div>
          </div>

          <div class="linha-inputs">
            <div class="form-group">
              <input id="endereco" type="text" placeholder="Endereço" required />
            </div>
            <div class="form-group">
              <input id="descricao" type="text" placeholder="Descrição" required />
            </div>
          </div>

          <div class="form-group" style="margin-top: 10px;">
            <input id="senha" type="password" placeholder="Senha" required />
          </div>

          <div class="form-group-caixa">
            <textarea id="tags" placeholder="Tags"></textarea>
          </div>

          <div class="rodape-form">
            <button type="submit" class="btn btn-salvar">Salvar</button>
            <a href="Login.html" class="link-conta">Já tem uma conta?</a>
          </div>
        </form>
      </section>
    </main>

    <footer class="rodape rodape-escuro">
      &copy; 2026 Todos os Direitos Reservados pela Empresa MIST Soluções
    </footer>
  </div>
</body>
</html>
