<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conexão de Trabalhos Informais</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page-wrap">
    <header class="topo">
      <img class="logo" src="https://via.placeholder.com/180x52?text=MIST+Solu%C3%A7%C3%B5es" alt="MIST Soluções" />
    </header>

    <main class="centered">
      <section class="card">
        <h2>Fazer Login</h2>

        <form>
          <div class="form-group">
            <label for="email">E-mail</label>
            <input id="email" type="email" placeholder="seu@email.com" required />
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <input id="senha" type="password" placeholder="********" required />
          </div>

          <div class="actions">
            <a href="#">Esqueceu sua senha?</a>
            <a href="#">Cadastrar-se</a>
          </div>

          <button type="submit" class="btn">Entrar</button>
        </form>
      </section>
    </main>

    <footer class="rodape">
      &copy; 2026 Conexão Informal. Todos os direitos reservados.
    </footer>
  </div>
</body>
</html>
